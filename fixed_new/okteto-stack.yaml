services:
  drone-srcb:
    build: .
    environment:
      API_ID: $API_ID  
      API_HASH: $API_HASH  
      BOT_TOKEN: $BOT_TOKEN 
      SESSION: $SESSION
      AUTH: $AUTH
      FORCESUB: $FORCESUB
      SAVE_CHANNEL: $SAVE_CHANNEL
    ports:
      - 8080
    resources:
      cpu: 1000m
      memory: 3Gi
